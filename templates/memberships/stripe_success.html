{% extends "base.html" %} {% block title %}Processing Payment...{% endblock %}
{% block content %}
<div style="text-align: center; padding: 40px">
  <h2>Processing your membership...</h2>
  <p>
    We've received your payment. Please wait while we activate your membership.
  </p>
  <div style="margin-top: 20px">
    <span
      style="
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid var(--primary);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      "
    ></span>
  </div>
</div>
<style>
  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(360deg);
    }
  }
</style>
{% endblock %} {% block scripts %}
<script>
  (function () {
    const checkStatus = () => {
      const token = window.getToken();
      if (!token) {
        window.location.href = "/login/?next={% url 'memberships:dashboard' %}";
        return;
      }

      fetch("{% url 'memberships:api-status' %}", {
        headers: window.authHeaders(),
      })
        .then(async (res) => {
          const data = await res.json().catch(() => ({}));
          if (res.status === 401) {
            window.location.href =
              "/login/?next={% url 'memberships:dashboard' %}";
            return;
          }
          if (res.ok && data.status === "active") {
            window.location.href = "{% url 'memberships:dashboard' %}";
            return;
          }
          setTimeout(checkStatus, 2000);
        })
        .catch(() => setTimeout(checkStatus, 2000));
    };
    setTimeout(checkStatus, 2000);
  })();
</script>
{% endblock %}
